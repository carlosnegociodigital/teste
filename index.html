        /* Cabeçalho e Redes Sociais */

        /* Container das Redes Sociais no Canto Superior Direito */
        .social-media { position: absolute; top: 15px; right: 20px; display: flex; gap: 12px; }
        .social-icon { display: flex; align-items: center; justify-content: center; width: 35px; height: 35px; border-radius: 50%; background: rgba(255, 255, 255, 0.2); transition: all 0.3s ease; text-decoration: none; }
